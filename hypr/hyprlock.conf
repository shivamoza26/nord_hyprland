background {
    monitor =
    path = ~/.config/hypr/lockwall.png
    blur_passes = 3
    blur_size = 8
    brightness = 0.5
}

label {
    monitor =
    text = cmd[update:1000] date '+%-I:%M %p'
    font_size = 96
    font_family = JetBrains Mono
    color = rgba(D8DEE9ff)
    position = 0, 280
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] date '+%A, %d %B'
    font_size = 24
    font_family = JetBrains Mono
    color = rgba(D8DEE9ee)
    position = 0, 170
    halign = center
    valign = center
}

image {
    monitor =
    path = /home/shivmexe/Pictures/icon/icon.png
    size = 80
    rounding = -1
    border_size = 2
    border_color = rgba(D8DEE966)
    position = 0, 60
    halign = center
    valign = center
}

label {
    monitor =
    text = Hello, shivmexe
    font_size = 20
    font_family = JetBrains Mono
    color = rgba(ECEFF4ff)
    position = 0, -20
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 200, 40
    outline_thickness = 0
    inner_color = rgba(4C566Aaa)
    font_color = rgba(D8DEE9ff)
    placeholder_text = Use Me
    rounding = 20
    position = 0, -100
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:2000] playerctl metadata --format '♪  $artist — $title' 2>/dev/null
    font_size = 16
    font_family = JetBrains Mono
    color = rgba(D8DEE9cc)
    position = 0, -60
    halign = center
    valign = bottom
}
