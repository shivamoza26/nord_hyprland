#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hypr.land/Configuring/Variables/

# https://wiki.hypr.land/Configuring/Variables/#general
general {
    gaps_in  = 5
    gaps_out = 20

    border_size = 1

    # https://wiki.hypr.land/Configuring/Variables/#variable-types for info about colors
    col.active_border   = rgba(8fbcbbff)   # nord7 (muted teal)
    col.inactive_border = rgba(2e3440ff)   # nord0

    # Set to true to enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hypr.land/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    rounding = 10

    blur {
        enabled           = true
        size              = 6
        passes            = 1
	    vibrancy 	  = 0.1696
        new_optimizations = true
        xray = false
    }

        active_opacity = 0.85
        inactive_opacity = 0.80

    shadow {
        enabled      = true
        range        = 20
        render_power = 3
        color        = rgba(00000055)
    }
}

# https://wiki.hypr.land/Configuring/Variables/#animations
animations {
    enabled = yes, please :)

    # Default curves — see https://wiki.hypr.land/Configuring/Animations/#curves
    #        NAME,           X0,   Y0,   X1,   Y1
    bezier = easeOutQuint,   0.22, 1,    0.36, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1
    bezier = minimal,        0.25, 0.9,  0.3,  1.0

    # Default animations — see https://wiki.hypr.land/Configuring/Animations/
    #           NAME,          ONOFF, SPEED, CURVE,        [STYLE]
    animation = global,        1,     5,     default
    animation = border,        1,     5,     minimal
    animation = windows,       1,     4,     minimal
    animation = windowsIn,     1,     4,     minimal,      popin 95%
    animation = windowsOut,    1,     3,     minimal,      popin 95%
    animation = fadeIn,        1,     3,     almostLinear
    animation = fadeOut,       1,     3,     almostLinear
    animation = fade,          1,     3,     minimal
    animation = layers,        1,     3,     minimal
    animation = layersIn,      1,     3,     minimal,      fade
    animation = layersOut,     1,     2.5,   minimal,      fade
    animation = fadeLayersIn,  1,     2.5,   almostLinear
    animation = fadeLayersOut, 1,     2.5,   almostLinear
    animation = workspaces,    1,     2.5,   minimal,      fade
    animation = workspacesIn,  1,     2.5,   minimal,      fade
    animation = workspacesOut, 1,     2.5,   minimal,      fade
    animation = zoomFactor,    1,     4,     quick
}

# See https://wiki.hypr.land/Configuring/Dwindle-Layout/
dwindle {
    force_split                  = 0
    preserve_split               = false
    smart_split                  = false
    smart_resizing               = true
    permanent_direction_override = false
    special_scale_factor         = 1
    split_width_multiplier       = 1.0
    use_active_for_splits        = true
    default_split_ratio          = 1.0
    split_bias                   = 0
    precise_mouse_move           = false
}
# See https://wiki.hypr.land/Configuring/Master-Layout/
master {
    new_status = master
}

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    force_default_wallpaper = -1    # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo   = false # If true, disables the random hyprland logo / anime girl background :(
}
