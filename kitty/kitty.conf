font_family      CaskaydiaCove Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12
shell   	 	zsh
shell_intregration 	disabled	
cursor_shape 		beam
cursor_blink_interval 	0
remember_window_size no
window_padding_width 5
background_opacity 		0.6
scrollbar_handle_opacity 	0
scrollbar_track_opacity 	0
scroll_track_hover_opacity 	0
sync_to_monitor			no
confirm_os_window_close 	0

# Nord 16-color palette
color0  #3b4252
color1  #bf616a
color2  #a3be8c
color3  #ebcb8b
color4  #81a1c1
color5  #b48ead
color6  #88c0d0
color7  #e5e9f0
color8  #4c566a
color9  #bf616a
color10 #a3be8c
color11 #ebcb8b
color12 #81a1c1
color13 #b48ead
color14 #88c0d0
color15 #eceff4

# Dark
foreground            #d8dee9
background            #2e3440
selection_foreground  #d8dee9
selection_background  #3b4252

# Mark colors — now distinct so mark1/mark2/mark3 are visually different
mark1_foreground #d08770
mark2_foreground #ebcb8b
mark3_foreground #a3be8c

url_color #e5e9f0

# Cursor colors
cursor            #d8dee9
cursor_text_color #4c566a

# Tab bar colors
active_tab_foreground   #e5e9f0
active_tab_background   #4c566a
inactive_tab_foreground #d8dee9
inactive_tab_background #3b4252

#key-mapping
map ctrl+c copy_to_clipboard
map ctrl+v paste_from_clipboard
map ctrl+d interrupt
