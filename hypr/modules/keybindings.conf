###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# --- Core apps ---
bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, S, exec, $menu
bind = $mainMod, B, exec, $browser
bind = $mainMod, PERIOD, exec, $terminal -e $code_editor
bind = $mainMod, M, exec, $music
bind = $mainMod SHIFT,C , exec, $clipboard
bind = $mainMod SHIFT, SPACE, exec, $wallpaper
bind = $mainMod, Escape, exec, $bootmenu
bind = $mainMod, I, exec, $settings
bind = $mainMod, N, exec, $notes
bind = $mainMod, C, exec, $chat
bind = $mainMod, O, exec, $office


# --- Window management ---
bind = $mainMod, W, killactive,
bind = $mainMod, V, togglefloating,
bind = $mainMod SHIFT, P, pseudo,                # dwindle pseudotile
bind = $mainMod SHIFT, J, layoutmsg, togglesplit # dwindle split toggle

# --- Exit ---
# bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit

# --- Focus movement ---
bind = $mainMod, H, movefocus, l
bind = $mainMod, J, movefocus, u
bind = $mainMod, K, movefocus, d
bind = $mainMod, L, movefocus, r

# --- Workspace switching ---
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# --- Move window to workspace ---
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# --- Special workspace (scratchpad) ---rq21212
# bind = $mainMod,       S, togglespecialworkspace, magic
# bind = $mainMod SHIFT, S, movetoworkspace,         special:magic

# --- Scroll through workspaces ---
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# --- Move / resize windows with mouse ---
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# --- Volume Controls ---
bind = , XF86AudioMute, exec, swayosd-client --output-volume mute-toggle
binde = , XF86AudioLowerVolume, exec, swayosd-client --output-volume lower
binde = , XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise
bind = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle && swayosd-client --input-volume mute-toggle

# --- Brightness Controls ---
bind = , XF86MonBrightnessDown, exec, swayosd-client --brightness lower
bind = , XF86MonBrightnessUp, exec, swayosd-client --brightness raise

# --- Media Controls ---
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous

# --- CapsLock Indicator ---
bind = , Caps_Lock, exec, swayosd-client --caps-lock

#Screenshot
bind = $mainMod SHIFT, S, exec, ~/.local/bin/scripts/screenshot.sh region
bind = , PRINT, exec, ~/.local/bin/scripts/screenshot.sh fullscreen

#hyprlock

bind = $mainMod SHIFT, L, exec, hyprlock
bindl = , switch:Lid Switch, exec, hyprlock

#Btop 
bind = $mainMod SHIFT SHIFT, Escape, exec, $terminal -e btop

